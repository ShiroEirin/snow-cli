name: Publish to NPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org/'

      - name: Use CI npm config
        run: cp .npmrc.ci .npmrc

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Snow CLI ${{ github.ref_name }}

            ### What's New

            - 修复 Team 模式的越权问题
            - 添加 `/btw` 命令分支对话流与工作中的 AI 对话
            - 添加 `/role-subagent` 命令为系统子代理注入用户自定义提示词
            - filesystem 工具重构加入`hash-line`编辑提高编辑精度
            - 修复部分编程语言无法渲染高亮的警告
            - 工具响应 token 数量从自定义 token 数修改为上下文百分比
            - mcp 面板支持通过 `v` 进入工具列表后使用`Tab`键对特定工具启停

            ### Installation
            ```bash
            npm install -g snow-ai
            ```

            ### Usage
            ```bash
            snow
            ```
            ### Update
            ```bash
            snow --update
            ```
          draft: false
          prerelease: false
